。`,`但本研究成果未来有望为免疫相关性神经系统疾病患者的精准诊断与治疗提供科学依据。从长远来看，可能使受试者及更多同类疾病患者受益。`,`研究结果若衍生任何知识产权或商业利益，所有权益将归属仁济医院及相关研究机构，与参与者个人无关。`]}]},{title:`技术的局限性`,icon:`dna`,eyebrow:`前沿技术与探索性结论`,blocks:[{paragraphs:[`本研究采用的多组学技术处于科学前沿，但仍存在一定局限性。`,`依据现有医学研究水平，部分基因变异、蛋白标志物或免疫克隆特征可能无法被当前技术全面检出，相关发现的临床意义有待进一步验证。`,`此外，本研究为探索性研究，所得结论属于初步科学发现，尚不能直接转化为临床诊疗建议。`]}]},{title:`隐私保护`,icon:`lock`,eyebrow:`匿名化、保密与合规`,blocks:[{paragraphs:[`仁济医院将在法律规定的范围内严格保护受试者的个人隐私。`,`受试者的样本和信息将被匿名化编码处理，研究人员无法通过编码直接获得可辨识身份的个人资料。`,`研究所得数据可能以匿名形式在学术期刊或学术会议上公开发表，但不会公布受试者患者编号或任何可辨识身份的个人资料。`,`受试者的遗传信息及其他个人健康信息将被严格保密，任何可识别个人身份的信息都不会被擅自转交给其他未授权第三方机构或个人。`,`数据的存储、传输和使用均遵循国家相关法律法规，包括《中华人民共和国个人信息保护法》及《人类遗传资源管理条例》的相关要求。`]}]},{title:`退出研究`,icon:`chevronRight`,eyebrow:`自愿退出与咨询渠道`,blocks:[{paragraphs:[`受试者有权在任何时候无需说明理由地退出本研究。`,`退出研究不会影响受试者在仁济医院接受的正常临床诊疗服务。`,`如果受试者对本研究项目有任何问题或疑虑，可以随时联系临床协调员（CRC）或仁济医院研究团队负责人，研究团队将及时答复相关问题。`]}]},{title:`知情同意声明`,icon:`shield`,eyebrow:`声明确认与签署信息`,blocks:[{title:`声明确认`,items:[`我已经阅读并理解了本知情同意书的全部内容。`,`我有机会提问，而且所有问题均已得到解答。`,`我理解参加本项目完全是自愿的。`,`我清楚签署以后如还有疑问，可以随时联系仁济医院研究团队的临床协调员或负责人。`,`我知道签名并不意味可以免去任何费用、应尽责的事项。`,`我的样本和/或信息在移除可识别个人身份信息后，可能用于免疫相关性神经系统疾病发病机制、诊断标志物及治疗靶点相关研究，并可能在学术期刊或学术会议上发表。`],variant:`checklist`},{title:`选择项`,items:[`同意`,`不同意`],variant:`choice`},{title:`签署信息`,items:[`打印知情`,`上传知情`,`查看知情`],variant:`documentActions`}]}];function si(e){return[`完成`,`已完成`,`已签署`,`结果回传`,`检测完成`,`结果归档`,`可导出`,`通过`,`Active`].includes(e)?`success`:[`进行中`,`检测中`,`数据分析`,`文库构建`,`生成中`,`待确认`,`待签署`].includes(e)?`warning`:[`已撤回`,`未通过`,`失败/重测`,`需复核`].includes(e)?`danger`:`info`}function ci({value:e}){return N(`span`,{className:`status-pill status-pill--${si(e)}`,children:e})}function li({section:e,onPrint:t,onUnderstand:n,onUpload:r}){let[i,a]=(0,_.useState)(`同意`);return N(`div`,{className:`consent-section-body`,children:e.blocks.map((o,s)=>P(`article`,{className:`consent-section-block`,children:[o.title?N(`h4`,{children:o.title}):null,o.paragraphs?.map(e=>N(`p`,{children:e},e)),o.items&&o.variant===`choice`?N(`div`,{className:`consent-ch
