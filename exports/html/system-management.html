earch patient ID or hospital No.`,签署日期:`Signed date`,版本:`Version`,免疫相关性神经系统疾病多组学解析及机制探索:`Multi-omics Analysis and Mechanistic Study of Immune-related Neurological Diseases`,研究详情入口当前为展示状态:`Study detail entry is display-only in this demo`,研究项目概述:`Study overview`,项目性质与研究目标:`Study type and objectives`,样本和信息用途:`Use of samples and information`,研究性检测与样本保存:`Research testing and sample storage`,可能的风险:`Potential risks`,低风险与采样说明:`Low risk and sampling information`,预期获益:`Expected benefits`,直接获益与长期价值:`Direct benefits and long-term value`,技术的局限性:`Technology limitations`,前沿技术与探索性结论:`Advanced technologies and exploratory findings`,隐私保护:`Privacy protection`,"匿名化、保密与合规":`De-identification, confidentiality, and compliance`,退出研究:`Study withdrawal`,自愿退出与咨询渠道:`Voluntary withdrawal and contact channels`,知情同意声明:`Consent declaration`,声明确认与签署信息:`Declaration confirmation and signature information`,声明确认:`Declaration confirmation`,选择项:`Choice`,同意:`Agree`,不同意:`Do not agree`,签署信息:`Signature information`,"本项目《免疫相关性神经系统疾病的多组学解析及机制探索》是由上海交通大学医学院附属仁济医院主持开展的非干预性临床研究。":`This non-interventional clinical study, "Multi-omics Analysis and Mechanistic Study of Immune-related Neurological Diseases," is led by Renji Hospital, Shanghai Jiao Tong University School of Medicine.`,"研究聚焦于神经精神性系统性红斑狼疮（NPSLE）、多发性硬化（MS）及视神经脊髓炎谱系疾病（NMOSD）等免疫相关性神经系统疾病。":`The study focuses on immune-related neurological diseases including neuropsychiatric systemic lupus erythematosus (NPSLE), multiple sclerosis (MS), and neuromyelitis optica spectrum disorder (NMOSD).`,"本研究旨在通过多组学技术，包括全基因组测序、TCR/BCR 免疫组库测序、超敏蛋白组学及空间转录组学，解析疾病发病机制，发现具有诊断和预后价值的生物标志物，并实现基于分子机制的疾病精准分型，为未来精准化治疗提供科学依据。":`The study uses multi-omics technologies, including whole-genome sequencing, TCR/BCR immune repertoire sequencing, ultra-sensitive proteomics, and spatial transcriptomics, to explore mechanisms, identify diagnostic and prognostic biomarkers, and support mechanism-based disease stratification for future precision treatment.`,"本研究属于纯观察性研究，研究人员不会对受试者的临床诊疗方案作出任何干预或更改。所有研究性检测均在临床诊疗所需样本采集的基础上进行。研究结果仅用于科学研究目的，不直接用于指导个人临床治疗。研究所得数据将经匿名化处理，由仁济医院研究团队进行多组学联合分析。":`This is an observational study. Researchers will not intervene in or change clinical care. Research testing is performed on samples collected as part of clinical care. Results are for scientific research only and are not used directly to guide individual treatment. Data will be de-identified and analyzed by the Renji Hospital study team.`,"受试者的信息和样本将用于以下研究性检测与分析：":`Participant information and samples will be used for the following research tests and analyses:`,"全基因组测序（WGS）：用于检测免疫相关易感基因位点。":`Whole-genome sequencing (WGS): used to detect immune-related susceptibility loci.`,"TCR/BCR 免疫组库测序：用于分析外周血及脑脊液中 T 细胞和 B 细胞克隆扩增情况。":`TCR/BCR immune repertoire sequencing: used to analyze T-cell and B-cell clonal expansion in peripheral blood and cerebrospinal fluid.`,"超敏蛋白组学检测（Olink/Simoa）：用于检测血清及脑脊液中神经损伤标志物，如 NfL、GFAP，炎症因子如 CXCL13，以及自身抗体谱。":`Ultra-sensitive proteomics (Olink/Simoa): used to measure markers in serum and cerebrospinal fluid, including NfL, GFAP, CXCL13, and autoantibody profiles.`,"空间转录组学分析：适用于有肾穿刺活检组织的 SLE 患者。":`Spatial transcriptomics: applicable to SLE patients with kidney biopsy tissue.`,"受试者的信息和剩余样本将由仁济医院研究团队长期保存，未来可能用于免疫相关性神经系统疾病机制、诊断标志物及治疗靶点的相关研究。":`Participant information and remaining samples will be stored by the Renji Hospital study team and may be used in future research on mechanisms, diagnostic biomarkers, and therapeutic targets for immune-related neurological diseases.`,"在样本和信息保存期间，如受试者明确提出样本和/或信息销毁申请，研究团队将按照仁济医院相关规程进行处理。":`During storage, if a participant requests destruction of samples and/or information, the study team will handle the request according to Renji Hospital procedures.`,"研究团队可能在研究期间对受试者进行定期随访，采集并更新临床信息，包括疾病活动评分、影像学及认知评估等，以了解疾病进展情况。":`The study team may conduct regular follow-up during the study and update clinical information, including disease activity scores, imaging, and cognitive assessments, to understand disease progression.`,"研究团队不会对受试者的个人信息和样本进行买卖、基因编辑等违反法律法规、伦理道德和国家利益的活动。":`The study team will not sell participant information or samples, perform gene editing, or conduct any activity that violates law, ethics, or national interests.`,"参与本研究对受试者的风险极低。":`Participation in this study carries very low risk.`,"血液样本：研究所需血液采集将与临床诊疗常规抽血同步进行，通常需要额外提供 10-20 ml 血液，可能引起轻微疼痛或淤青，属于常规静脉采血的正常风险范围。":`Blood samples: study blood collection will be coordinated with routine clinical blood draws and usually requires an additional 10-20 ml of blood. Minor pain or bruising may occur, which is within the normal risk range of venipuncture.`,"脑脊液样本：适用于临床已决定行腰椎穿刺检查的患者。研究仅使用临床操作中剩余的脑脊液样本，不额外增加穿刺次数，不带来额外风险。":`Cerebrospinal fluid samples: applicable to patients already scheduled for lumbar puncture. The study uses only remaining clinical samples, adds no puncture procedures, and brings no additional risk.`,"肾穿刺组织：适用于临床已决定行肾穿刺活检的 SLE 患者。研究仅在充分保证病理诊断所需样本后，使用剩余组织，不增加额外创伤。":`Kidney biopsy tissue: applicable to SLE patients already scheduled for kidney biopsy. The study uses remaining tissue only after diagnostic needs are met and adds no additional injury.`,"所有样本采集均不影响受试者的临床诊疗结果，也不额外增加健康风险。":`Sample collection will not affect clinical care or add health risk.`,"如发现样本质量不符合研究要求，研究人员会与受试者沟通是否愿意配合重新采集，但受试者有权拒绝。":`If sample quality does not meet study requirements, researchers may ask whether the participant is willing to provide another sample, and the participant may refuse.`,"参与本研究不会为受试者提供额外的经济补偿，受试者也不会直接从本研究结果中获得经济利益。":`Participation does not provide additional financial compensation, and participants will not directly receive economic benefits from study results.`,"由于本研究属于探索性研究，受试者个人目前极有可能不会因研究结果而获得直接的医疗获益。":`Because this is exploratory research, individual participants are unlikely to receive direct medical benefit from the study results at this stage.`,"但本研究成果未来有望为免疫相关性神经系统疾病患者的精准诊断与治疗提供科学依据。从长远来看，可能使受试者及更多同类疾病患者受益。":`However, the findings may support future precision diagnosis and treatment for immune-related neurological diseases and may benefit participants and similar patients over the long term.`,"研究结果若衍生任何知识产权或商业利益，所有权益将归属仁济医院及相关研究机构，与参与者个人无关。":`Any intellectual property or commercial benefits derived from the study will belong to Renji Hospital and related research institutions, not individual participants.`,"本研究采用的多组学技术处于科学前沿，但仍存在一定局限性。":`The multi-omics technologies used in this study are scientifically advanced but still have limitations.`,"依据现有医学研究水平，部分基因变异、蛋白标志物或免疫克隆特征可能无法被当前技术全面检出，相关发现的临床意义有待进一步验证。":`Given current medical knowledge, some genetic variants, protein markers, or immune clonal features may not be fully detected, and the clinical significance of findings requires further validation.`,"此外，本研究为探索性研究，所得结论属于初步科学发现，尚不能直接转化为临床诊疗建议。":`In addition, this exploratory study produces preliminary scientific findings that cannot yet be directly translated into clinical treatment recommendations.`,"仁济医院将在法律规定的范围内严格保护受试者的个人隐私。":`Renji Hospital will strictly protect participant privacy within the scope required by law.`,"受试者的样本和信息将被匿名化编码处理，研究人员无法通过编码直接获得可辨识身份的个人资料。":`Participant samples and information will be coded and de-identified so researchers cannot directly identify individuals from the codes.`,"研究所得数据可能以匿名形式在学术期刊或学术会议上公开发表，但不会公布受试者患者编号或任何可辨识身份的个人资料。":`Study data may be published anonymously in academic journals or conferences, but patient IDs or identifiable personal information will not be disclosed.`,"受试者的遗传信息及其他个人健康信息将被严格保密，任何可识别个人身份的信息都不会被擅自转交给其他未授权第三方机构或个人。":`Genetic and other personal health information will be kept strictly confidential, and identifiable information will not be transferred to unauthorized third parties.`,"数据的存储、传输和使用均遵循国家相关法律法规，包括《中华人民共和国个人信息保护法》及《人类遗传资源管理条例》的相关要求。":`Data storage, transfer, and use will follow applicable national laws and regulations, including personal information protection and human genetic resource requirements.`,"受试者有权在任何时候无需说明理由地退出本研究。":`Participants may withdraw from the study at any time without giving a reason.`,"退出研究不会影响受试者在仁济医院接受的正常临床诊疗服务。":`Withdrawal will not affect normal clinical care at Renji Hospital.`,"如果受试者对本研究项目有任何问题或疑虑，可以随时联系临床协调员（CRC）或仁济医院研究团队负责人，研究团队将及时答复相关问题。":`If participants have questions or concerns, they may contact the clinical research coordinator (CRC) or the Renji Hospital study lead at any time, and the team will respond promptly.`,"我已经阅读并理解了本知情同意书的全部内容。":`I have read and understood the full consent form.`,"我有机会提问，而且所有问题均已得到解答。":`I had the opportunity to ask questions, and all questions have been answered.`,"我理解参加本项目完全是自愿的。":`I understand that participation is entirely voluntary.`,"我清楚签署以后如还有疑问，可以随时联系仁济医院研究团队的临床协调员或负责人。":`I understand that after signing, I may contact the Renji Hospital study coordinator or study lead at any time if I have further questions.`,"我知道签名并不意味可以免去任何费用、应尽责的事项。":`I understand that signing does not waive any fees or responsibilities that still apply.`,"我的样本和/或信息在移除可识别个人身份信息后，可能用于免疫相关性神经系统疾病发病机制、诊断标志物及治疗靶点相关研究，并可能在学术期刊或学术会议上发表。":`After identifiable information is removed, my samples and/or information may be used for research on mechanisms, diagnostic biomarkers, and therapeutic targets for immune-related neurological diseases, and may be published in academic journals or conferences.`,已采集:`Collected`,已送检:`Sent for testing`,检测中:`Testing`,检测完成:`Testing complete`,结果回传:`Results returned`,待处理:`Pending`,待检测:`Pending testing`,待检:`Pending`,已通过:`Passed`,通过:`Passed`,未通过:`Failed`,待确认:`Pending confirmation`,样本接收:`Sample received`,文库构建:`Library prep`,测序完成:`Sequencing complete`,已预约:`Scheduled`,生成中:`Generating`,需复核:`Needs review`,启用:`Enabled`,草稿:`Draft`,保存:`Save`,取消:`Cancel`,保存草稿:`Save draft`,提交:`Submit`,新增:`Add`,待录入:`Pending entry`,无明显不良事件:`No obvious adverse events`,"1级乏力":`Grade 1 fatigue`,"胸部CT提示靶病灶稳定；ctDNA 动态监测与 NGS 结果已同步复核。":`Chest CT indicates stable target lesions; ctDNA dynamic monitoring and NGS results have been reconciled.`,"等待 API":`Waiting for API`,"等待 API 数据":`Waiting for API data`,"等待 FastAPI / SQLite":`Waiting for FastAPI / SQLite`,"SQLi 神经系统疾病机制、诊断标志物及治疗靶点的相关研究。`,`在样本和信息保存期间，如受试者明确提出样本和/或信息销毁申请，研究团队将按照仁济医院相关规程进行处理。`,`研究团队可能在研究期间对受试者进行定期随访，采集并更新临床信息，包括疾病活动评分、影像学及认知评估等，以了解疾病进展情况。`,`研究团队不会对受试者的个人信息和样本进行买卖、基因编辑等违反法律法规、伦理道德和国家利益的活动。`]}]},{title:`可能的风险`,icon:`alerts`,eyebrow:`低风险与采样说明`,blocks:[{paragraphs:[`参与本研究对受试者的风险极低。`],items:[`血液样本：研究所需血液采集将与临床诊疗常规抽血同步进行，通常需要额外提供 10-20 ml 血液，可能引起轻微疼痛或淤青，属于常规静脉采血的正常风险范围。`,`脑脊液样本：适用于临床已决定行腰椎穿刺检查的患者。研究仅使用临床操作中剩余的脑脊液样本，不额外增加穿刺次数，不带来额外风险。`,`肾穿刺组织：适用于临床已决定行肾穿刺活检的 SLE 患者。研究仅在充分保证病理诊断所需样本后，使用剩余组织，不增加额外创伤。`]},{paragraphs:[`所有样本采集均不影响受试者的临床诊疗结果，也不额外增加健康风险。`,`如发现样本质量不符合研究要求，研究人员会与受试者沟通是否愿意配合重新采集，但受试者有权拒绝。`]}]},{title:`预期获益`,icon:`check`,eyebrow:`直接获益与长期价值`,blocks:[{paragraphs:[`参与本研究不会为受试者提供额外的经济补偿，受试者也不会直接从本研究结果中获得经济利益。`,`由于本研究属于探索性研究，受试者个人目前极有可能不会因研究结果而获得直接的医疗获益。`,`但本研究成果未来有望为免疫相关性神经系统疾病患者的精准诊断与治疗提供科学依据。从长远来看，可能使受试者及更多同类疾病患者受益。`,`研究结果若衍生任何知识产权或商业利益，所有权益将归属仁济医院及相关研究机构，与参与者个人无关。`]}]},{title:`技术的局限性`,icon:`dna`,eyebrow:`前沿技术与探索性结论`,blocks:[{paragraphs:[`本研究采用的多组学技术处于科学前沿，但仍存在一定局限性。`,`依据现有医学研究水平，部分基因变异、蛋白标志物或免疫克隆特征可能无法被当前技术全面检出，相关发现的临床意义有待进一步验证。`,`此外，本研究为探索性研究，所得结论属于初步科学发现，尚不能直接转化为临床诊疗建议。`]}]},{title:`隐私保护`,icon:`lock`,eyebrow:`匿名化、保密与合规`,blocks:[{paragraphs:[`仁济医院将在法律规定的范围内严格保护受试者的个人隐私。`,`受试者的样本和信息将被匿名化编码处理，研究人员无法通过编码直接获得可辨识身份的个人资料。`,`研究所得数据可能以匿名形式在学术期刊或学术会议上公开发表，但不会公布受试者患者编号或任何可辨识身份的个人资料。`,`受试者的遗传信息及其他个人健康信息将被严格保密，任何可识别个人身份的信息都不会被擅自转交给其他未授权第三方机构或个人。`,`数据的存储、传输和使用均遵循国家相关法律法规，包括《中华人民共和国个人信息保护法》及《人类遗传资源管理条例》的相关要求。`]}]},{title:`退出研究`,icon:`chevronRight`,eyebrow:`自愿退出与咨询渠道`,blocks:[{paragraphs:[`受试者有权在任何时候无需说明理由地退出本研究。`,`退出研究不会影响受试者在仁济医院接受的正常临床诊疗服务。`,`如果受试者对本研究项目有任何问题或疑虑，可以随时联系临床协调员（CRC）或仁济医院研究团队负责人，研究团队将及时答复相关问题。`]}]},{title:`知情同意声明`,icon:`shield`,eyebrow:`声明确认与签署信息`,blocks:[{title:`声明确认`,items:[`我已经阅读并理解了本知情同意书的全部内容。`,`我有机会提问，而且所有问题均已得到解答。`,`我理解参加本项目完全是自愿的。`,`我清楚签署以后如还有疑问，可以随时联系仁济医院研究团队的临床协调员或负责人。`,`我知道签名并不意味可以免去任何费用、应尽责的事项。`,`我的样本和/或信息在移除可识别个人身份信息后，可能用于免疫相关性神经系统疾病发病机制、诊断标志物及治疗靶点相关研究，并可能在学术期刊或学术会议上发表。`],variant:`checklist`},{title:`选择项`,items:[`同意`,`不同意`],variant:`choice`},{titl
