name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend and scripts
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall -q backend

      - name: Run API smoke
        run: npm run smoke:api

      - name: Run CRF semantics smoke
        run: npm run smoke:crf-semantics

      - name: Export OpenAPI schema
        run: npm run export:openapi

      - name: Export static HTML
        run: npm run export:html

      - name: Run UI smoke
        run: npm run smoke:ui

      - name: Run role and viewport browser matrix
        run: npm run browser:matrix

      - name: Run customer demo E2E
        run: npm run demo:e2e

      - name: Run release checklist gate
        run: npm run release:check

      - name: Run Docker smoke
        run: npm run smoke:docker
        env:
          DOCKER_SMOKE_DOWN: '1'

      - name: Upload static HTML export
        uses: actions/upload-artifact@v4
        with:
          name: linzight-static-html-export
          path: exports/html/
          if-no-files-found: error
