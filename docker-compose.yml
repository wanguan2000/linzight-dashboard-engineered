services:
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: linzight
      POSTGRES_USER: linzight
      POSTGRES_PASSWORD: linzight
    ports:
      - "5432:5432"
    volumes:
      - linzight_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linzight -d linzight"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      LINZIGHT_DATABASE_URL: sqlite:////data/linzight_demo.db
      LINZIGHT_UPLOADS_DIR: /uploads
    ports:
      - "8000:8000"
    volumes:
      - linzight_backend_data:/data
      - linzight_uploads:/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  linzight_backend_data:
  linzight_uploads:
  linzight_postgres_data:
