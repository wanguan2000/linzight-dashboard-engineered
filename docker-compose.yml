services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://nacoo@host.docker.internal:5432/linzight_dashboard_engineered}
      LINZIGHT_UPLOADS_DIR: /uploads
      LINZIGHT_INITIAL_ADMIN_EMAIL: ${LINZIGHT_INITIAL_ADMIN_EMAIL:-guan.wang@linzight.com}
      LINZIGHT_INITIAL_ADMIN_PASSWORD: ${LINZIGHT_INITIAL_ADMIN_PASSWORD:-ChangeMe1234!}
      LINZIGHT_PUBLIC_APP_URL: ${LINZIGHT_PUBLIC_APP_URL:-http://127.0.0.1:5173}
      LINZIGHT_SMTP_HOST: ${LINZIGHT_SMTP_HOST:-}
      LINZIGHT_SMTP_PORT: ${LINZIGHT_SMTP_PORT:-465}
      LINZIGHT_SMTP_SECURITY: ${LINZIGHT_SMTP_SECURITY:-ssl}
      LINZIGHT_SMTP_USERNAME: ${LINZIGHT_SMTP_USERNAME:-}
      LINZIGHT_SMTP_PASSWORD: ${LINZIGHT_SMTP_PASSWORD:-}
      LINZIGHT_SMTP_FROM: ${LINZIGHT_SMTP_FROM:-}
    ports:
      - "8000:8000"
    volumes:
      - linzight_uploads:/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  linzight_uploads:
